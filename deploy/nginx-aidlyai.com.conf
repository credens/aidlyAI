server {
    listen 80;
    listen [::]:80;

    server_name aidlyai.com www.aidlyai.com;

    root /var/www/aidlyai.com/current;
    index index.html;

    access_log /var/log/nginx/aidlyai.com.access.log;
    error_log /var/log/nginx/aidlyai.com.error.log;

    location /api/audit-request {
        proxy_pass http://127.0.0.1:3011/api/audit-request;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 128k;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
