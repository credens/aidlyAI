server {
    listen 80;
    listen [::]:80;

    server_name aidlyai.com www.aidlyai.com;

    root /var/www/aidlyai.com/current;
    index index.html;

    access_log /var/log/nginx/aidlyai.com.access.log;
    error_log /var/log/nginx/aidlyai.com.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
